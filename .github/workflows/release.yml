name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Ensure UAP Platform.xml 10.0.22000.0
        shell: pwsh
        run: |
          $uapBase  = "C:\Program Files (x86)\Windows Kits\10\Platforms\UAP"
          $target   = "$uapBase\10.0.22000.0"
          if (Test-Path $target) {
            Write-Host "UAP 10.0.22000.0 already present"
          } else {
            $src = Get-ChildItem $uapBase -Directory -ErrorAction SilentlyContinue |
                   Sort-Object Name -Descending | Select-Object -First 1
            if ($src) {
              Write-Host "Copying $($src.Name) -> 10.0.22000.0"
              Copy-Item $src.FullName $target -Recurse
            } else {
              Write-Host "No UAP dir found under $uapBase — listing Windows Kits:"
              Get-ChildItem "C:\Program Files (x86)\Windows Kits\10" -Directory | Format-Table Name
              throw "Cannot find any UAP Platform.xml to use"
            }
          }

      - name: Build release artifacts
        shell: pwsh
        run: scripts/build-release.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DockBar.msix
            release/DockBar.cer
            release/install.ps1
          generate_release_notes: true
