name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Ensure Windows SDK 10.0.22000.0 stubs
        shell: cmd
        run: |
          @echo off
          setlocal
          set KITS=C:\Program Files (x86)\Windows Kits\10

          :: --- UAP Platform.xml ---
          if exist "%KITS%\Platforms\UAP\10.0.22000.0" (
            echo UAP 10.0.22000.0 already present
          ) else (
            for /f "tokens=*" %%D in ('dir /b /ad /on "%KITS%\Platforms\UAP" 2^>nul') do set UAPSRC=%%D
            if defined UAPSRC (
              echo Linking UAP %UAPSRC% -^> 10.0.22000.0
              mklink /J "%KITS%\Platforms\UAP\10.0.22000.0" "%KITS%\Platforms\UAP\%UAPSRC%"
            ) else (
              echo ERROR: No UAP directory found & exit /b 1
            )
          )

          :: --- WinMD References ---
          if exist "%KITS%\References\10.0.22000.0" (
            echo References 10.0.22000.0 already present
          ) else (
            for /f "tokens=*" %%D in ('dir /b /ad /on "%KITS%\References" 2^>nul') do set REFSRC=%%D
            if defined REFSRC (
              echo Linking References %REFSRC% -^> 10.0.22000.0
              mklink /J "%KITS%\References\10.0.22000.0" "%KITS%\References\%REFSRC%"
            ) else (
              echo ERROR: No References directory found & exit /b 1
            )
          )

      - name: Build release artifacts
        shell: pwsh
        run: scripts/build-release.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DockBar.msix
            release/DockBar.cer
            release/install.ps1
          generate_release_notes: true
