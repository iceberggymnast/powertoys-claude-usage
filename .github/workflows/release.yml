name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows 10 SDK 22000 (UAP)
        shell: pwsh
        run: |
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsPath    = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          Write-Host "Installing Windows10SDK.22000 component..."
          $p = Start-Process $installer -ArgumentList @(
            'modify', '--installPath', $vsPath,
            '--add', 'Microsoft.VisualStudio.Component.Windows10SDK.22000',
            '--quiet', '--norestart', '--force'
          ) -Wait -PassThru -NoNewWindow
          Write-Host "Exit code: $($p.ExitCode)"
          # 0 = success, 3010 = success + reboot needed — both are fine
          if ($p.ExitCode -notin @(0, 3010)) { exit $p.ExitCode }

      - name: Build release artifacts
        shell: pwsh
        run: scripts/build-release.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DockBar.msix
            release/DockBar.cer
            release/install.ps1
          generate_release_notes: true
